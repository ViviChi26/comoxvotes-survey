<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neighbour Survey — comoxvotes.ca</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem;font-size:16px}
.survey-outer{max-width:700px;margin:0 auto}
.survey-header{text-align:center;margin-bottom:2rem}
.logo-placeholder{display:inline-flex;align-items:center;gap:8px;margin-bottom:1rem}
.logo-mark{width:38px;height:38px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:22px;height:22px;fill:white}
.logo-text{font-size:17px;font-weight:600;color:#1D9E75;letter-spacing:-0.01em}
.survey-card{background:#fff;border-radius:16px;border:0.5px solid #e0e0d8;padding:2rem}
.intro-screen{text-align:center;padding:1rem 0}
.intro-screen h2{font-size:28px;font-weight:500;color:#1a1a1a;margin-bottom:1rem}
.intro-screen p{font-size:16px;color:#555;line-height:1.8;margin-bottom:1rem}
.intro-meta{display:flex;justify-content:center;gap:1rem;margin:1.5rem 0;flex-wrap:wrap}
.intro-badge{display:flex;align-items:center;gap:6px;font-size:14px;color:#555;background:#f5f5f0;padding:7px 14px;border-radius:20px;border:0.5px solid #e0e0d8}
.intro-badge i{color:#1D9E75}
.intro-note{font-size:14px;color:#888;font-style:italic;margin-top:1rem}
.progress-bar{background:#f0f0ea;border-radius:8px;height:7px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:#1D9E75;transition:width 0.4s ease}
.section-indicator{display:flex;gap:8px;margin-bottom:1.5rem}
.sec-dot{width:9px;height:9px;border-radius:50%;background:#f0f0ea;border:0.5px solid #ddd;transition:all 0.2s}
.sec-dot.done{background:#1D9E75;border-color:#1D9E75}
.sec-dot.active{background:#9FE1CB;border-color:#1D9E75}
.section-label{font-size:12px;color:#999;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px}
.section-title{font-size:24px;font-weight:500;color:#1a1a1a;margin-bottom:6px}
.section-desc{font-size:16px;color:#666;line-height:1.6;margin-bottom:2rem}
.q-block{margin-bottom:2rem;padding-bottom:2rem;border-bottom:0.5px solid #f0f0ea}
.q-block:last-of-type{border-bottom:none}
.q-label{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:10px;line-height:1.5}
.q-sub{font-size:14px;color:#888;margin-bottom:10px;line-height:1.5}
.q-header{font-size:17px;font-weight:500;color:#1D9E75;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:0.5px solid #e0e0d8}
.scenario-box{background:#f9f9f7;border:0.5px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.scenario-num{font-size:11px;color:#1D9E75;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px}
.scenario-title{font-size:17px;font-weight:500;color:#1a1a1a;margin-bottom:10px}
.scenario-text{font-size:15px;color:#444;line-height:1.7;margin-bottom:1rem}
.scenario-q{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:10px}
.bridge-text{font-size:14px;color:#888;font-style:italic;margin-top:12px;padding-top:12px;border-top:0.5px solid #e0e0d8;line-height:1.6}
.option-grid{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:0.5px solid #e0e0d8;border-radius:8px;cursor:pointer;background:#fff;transition:border-color 0.15s,background 0.15s}
.opt:hover{border-color:#ccc;background:#f9f9f7}
.opt.selected{border-color:#1D9E75;background:#E1F5EE}
.opt input{margin-top:3px;accent-color:#1D9E75;flex-shrink:0}
.opt-text{font-size:15px;color:#1a1a1a;line-height:1.5}
.likert-row{display:flex;gap:6px;flex-wrap:wrap}
.lk-btn{flex:1;min-width:38px;padding:9px 4px;text-align:center;font-size:14px;border:0.5px solid #e0e0d8;border-radius:8px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.15s;font-family:inherit}
.lk-btn:hover{border-color:#bbb;background:#f9f9f7}
.lk-btn.selected{border-color:#1D9E75;background:#1D9E75;color:#fff}
.lk-labels{display:flex;justify-content:space-between;margin-top:6px}
.lk-label{font-size:12px;color:#999}
.scale-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.scale-btn{flex:1;min-width:30px;padding:9px 2px;text-align:center;font-size:13px;border:0.5px solid #e0e0d8;border-radius:6px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.15s;font-family:inherit}
.scale-btn:hover{border-color:#bbb;background:#f9f9f7}
.scale-btn.selected{border-color:#1D9E75;background:#1D9E75;color:#fff}
.scale-labels{display:flex;justify-content:space-between;margin-top:4px}
.scale-label{font-size:12px;color:#999;max-width:45%;line-height:1.3}
.scale-label:last-child{text-align:right}
.rating-group{margin-bottom:1.5rem;padding:1rem 1.25rem;background:#f9f9f7;border-radius:10px}
.rating-item{margin-bottom:1rem}
.rating-item:last-child{margin-bottom:0}
.rating-label{font-size:15px;color:#333;margin-bottom:7px;line-height:1.5}
textarea{width:100%;padding:11px 15px;font-size:15px;font-family:inherit;border:0.5px solid #e0e0d8;border-radius:8px;background:#fff;color:#1a1a1a;resize:vertical;min-height:95px;line-height:1.6;transition:border-color 0.15s}
textarea:focus{outline:none;border-color:#1D9E75}
select,input[type="email"],input[type="text"]{width:100%;padding:11px 15px;font-size:15px;font-family:inherit;border:0.5px solid #e0e0d8;border-radius:8px;background:#fff;color:#1a1a1a;transition:border-color 0.15s}
select:focus,input[type="email"]:focus,input[type="text"]:focus{outline:none;border-color:#1D9E75}
.input-mb{margin-bottom:9px;display:block}
.knowledge-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:13px;font-weight:500;margin-left:8px}
.badge-correct{background:#EAF3DE;color:#3B6D11}
.badge-wrong{background:#FCEBEB;color:#A32D2D}
.signup-block{padding:1rem 1.25rem;border:0.5px solid #1D9E75;border-radius:12px;background:#E1F5EE;margin-top:12px}
.signup-block p{font-size:15px;color:#0F6E56;margin-bottom:10px;line-height:1.5;font-weight:500}
.signup-block input{margin-bottom:9px}
.conditional-block{margin-top:12px;padding:1rem 1.25rem;border:0.5px solid #e0e0d8;border-radius:12px;background:#f9f9f7}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:2rem;gap:12px}
.btn{padding:11px 26px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn:hover{background:#f5f5f0}
.btn:disabled{opacity:0.35;cursor:default}
.btn-primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-primary:hover{background:#0F6E56;border-color:#0F6E56}
.btn-lg{padding:15px 34px;font-size:16px;border-radius:10px}
.nav-step{font-size:14px;color:#999}
.error-msg{font-size:14px;color:#A32D2D;margin-top:6px}
.submitting-overlay{text-align:center;padding:3rem 1rem}
.submitting-overlay p{font-size:16px;color:#555;margin-top:1rem}
.spinner{width:38px;height:38px;border:3px solid #e0e0d8;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.result-section{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:0.5px solid #f0f0ea}
.result-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.profile-pill{display:inline-block;padding:7px 18px;border-radius:20px;font-size:14px;font-weight:500;background:#E1F5EE;color:#0F6E56;margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.score-label{font-size:14px;color:#666;flex:1}
.score-bar-wrap{flex:2;height:8px;background:#f0f0ea;border-radius:4px;overflow:hidden}
.score-bar{height:100%;border-radius:4px;background:#1D9E75}
.score-val{font-size:14px;font-weight:500;color:#1a1a1a;min-width:36px;text-align:right}
.corr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.corr-item{padding:13px;border-radius:8px;background:#f9f9f7;border:0.5px solid #e8e8e0}
.corr-title{font-size:12px;color:#888;margin-bottom:4px}
.corr-val{font-size:15px;font-weight:500;color:#1a1a1a;line-height:1.4}
.closing-note{font-size:16px;color:#555;line-height:1.8;margin-bottom:1rem}
.run-highlight{padding:1rem 1.25rem;background:#E1F5EE;border:0.5px solid #1D9E75;border-radius:8px;margin-bottom:1rem}
.run-highlight p:first-child{font-size:15px;font-weight:500;color:#0F6E56;margin-bottom:4px}
.run-highlight p:last-child{font-size:14px;color:#0F6E56;line-height:1.6}
@media(max-width:520px){.survey-card{padding:1.25rem}.corr-grid{grid-template-columns:1fr}.intro-meta{gap:0.75rem}}
</style>
</head>
<body>
<div class="survey-outer">
  <div class="survey-header">
    <div class="logo-placeholder">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
      <span class="logo-text">comoxvotes.ca</span>
    </div>
  </div>
  <div class="survey-card" id="app"></div>
</div>
<script>
const FORMSPREE='https://formspree.io/f/mykazpgv';
const SECTIONS=[
  {title:'Your neighbourhood',label:'Section 1 of 6',desc:'Three neighbourhood scenarios to consider before we ask about leadership.'},
  {title:'Leadership qualities',label:'Section 2 of 6',desc:'Help us understand what qualities and values matter most in your next Mayor and Council.'},
  {title:'Community priorities',label:'Section 3 of 6',desc:'Tell us what issues matter most and what you want the next council to protect and preserve.'},
  {title:'Your council knowledge',label:'Section 4 of 6',desc:"A quick check on what's on your radar — no pressure, this helps us understand where neighbours are starting from."},
  {title:'Priorities and OCP',label:'Section 5 of 6',desc:'Share your views on recent planning decisions and what kind of Comox you want in the future.'},
  {title:'Your level of engagement',label:'Section 6 of 6',desc:'How do you see yourself showing up between now and Saturday, October 17, 2026?'},
];
const Q1_ITEMS=['Kind and caring','Humble','Transparent','Accountable','Courageous'];
const Q2_ITEMS=['Preparedness — does the research before the meeting','Critical systems thinking — sees how decisions connect to strategies','Independent judgment — doesn\'t lose the \'why\' when making decisions','Role clarity — knows the difference between council, management and community roles','Digital literacy — understands how emerging technology, data and AI impact municipal decisions and citizen privacy'];
const Q3_ITEMS=['Shows up, is present, prepared and engaged at every meeting','Attends and listens at neighbourhood meetings','Asks questions before deciding','Offers practical solutions not just positions','Works collaboratively to find solutions'];
const Q4_ITEMS=['Community stewardship — long-term thinking over short-term wins','Civic courage — puts community wellbeing above political convenience','Stands for rebuilding public trust — through council votes and community actions','Rooted in community-led leadership — not personal agenda or political pressure'];
const ALL_QUALITIES=[...Q1_ITEMS,...Q2_ITEMS,...Q3_ITEMS,...Q4_ITEMS];
const KNOWLEDGE_QS=[
  {id:'k1',q:'Which document guides long-term land use planning in Town of Comox?',opts:['Annual Budget','Official Community Plan (OCP)','Infrastructure Master Plan'],correct:1},
  {id:'k2',q:'When was the Town of Comox Official Community Plan last updated?',opts:['2022','2024','January 2025','February 2026'],correct:3},
  {id:'k3',q:'How many elected councillors sit on Comox Town Council (excluding the mayor)?',opts:['4','5','6','8'],correct:2},
  {id:'k4',q:'The Comox Valley Regional District (CVRD) is separate from the Town of Comox.',opts:['True — they are different bodies','False — they are the same body'],correct:0},
  {id:'k5',q:'When does BC hold its next General Local Election — including Comox?',opts:['October 2025','October 17, 2026','Spring 2027','November 2026'],correct:1},
];
const NEIGHBOURHOODS=['Buena Vista','Pritchard','Downtown','Hector-Aspen','Highland','Filberg','Foxwood','Radford','Manor','Other'];
const S2A1_ITEMS=['Housing — affordability, missing middle, tenant protection and housing for seniors — downsizing, assisted living and aging in place','Transportation — managing car traffic, congestion, parking and neighbourhood speed reduction','Neighbourhood safety — traffic speeds, crosswalks and safe streets','Aging infrastructure — roads, water, sewer systems and community facilities','Care services — daycare, senior care, community health'];
const S2A2_ITEMS=['Local economy — downtown vitality, supporting entrepreneurship and home based businesses','Recreation and community spaces — parks, trails, community centres, gathering places','Active transportation and micro-mobility — cycling, walking, scooters, e-bikes','Fiscal responsibility — fair taxation, transparent budgeting and value for public spending','Climate and environment — reducing emissions and protecting Comox\'s forests, waterways and green spaces that naturally absorb carbon'];
const S2B_ITEMS=['Protect the existing urban forest and tree canopy','Preserve remaining heritage properties','Steward the Salish Sea and waterfront view corridors','Honour Brooklyn Creek and remaining natural corridors','Maintain the charm and character of downtown Comox','Prepare Comox for storm water management and extreme weather','Safeguard Comox\'s natural habitat — birds, bees, insects, fish and urban wildlife'];
const state={screen:'intro',section:0,answers:{},errors:{},knowledgeRevealed:{}};
const ga=id=>state.answers[id];
function sa(id,val){state.answers[id]=val;state.errors[id]=false;render();}
function toggleCheck(id,val){const cur=state.answers[id]||[];const next=cur.includes(val)?cur.filter(v=>v!==val):[...cur,val];sa(id,next);}
function revealQ(id){state.knowledgeRevealed[id]=true;render();}
function getCivicScore(){return KNOWLEDGE_QS.filter(q=>state.answers[q.id]===q.correct).length;}
function getEngagementScore(){return(state.answers['s6_engage']||[]).length;}
function getEngagementProfile(){
  const s=getEngagementScore();
  if(s>=5)return'Comox Leader';
  if(s>=3)return'Community Champion';
  if(s>=1)return'Engaged Neighbour';
  return'Comox Neighbour';
}
function needsSignup(){const c=state.answers['s6_engage']||[];return c.includes('volunteer')||c.includes('drive')||c.includes('run');}
function wantsMeetGreet(){return state.answers['s6_meetgreet']===0||state.answers['s6_meetgreet']===1;}
function validate(section){
  const e={};
  if(section===1){
    if(!state.answers['s2_values'])e['s2_values']='Please share your thoughts';
    if(!state.answers['s2_missing'])e['s2_missing']='Please share your thoughts';
    if(!state.answers['s2_mayor'])e['s2_mayor']='Please share your thoughts';
    if(state.answers['s2_gap']===undefined)e['s2_gap']='Please select a rating';
    if(!state.answers['s2_gaptext'])e['s2_gaptext']='Please share your thoughts';
    if(!state.answers['s2_top3']||state.answers['s2_top3'].length<3)e['s2_top3']='Please select exactly 3 qualities';
  }
  if(section===2){
    if(!state.answers['s3a_comment'])e['s3a_comment']='Please share your thoughts';
  }
  if(section===3){
    KNOWLEDGE_QS.forEach(q=>{if(state.answers[q.id]===undefined)e[q.id]='Please select an answer';});
    if(state.answers['s4_familiar']===undefined)e['s4_familiar']='Please select a rating';
  }
  if(section===4){
    if(!state.answers['s5_years'])e['s5_years']='Please select how long you have lived or worked in Comox';
    if(!state.answers['s5_neighbourhood'])e['s5_neighbourhood']='Please select your neighbourhood';
    if(state.answers['s5_ocp_participated']===undefined)e['s5_ocp_participated']='Please select an answer';
  }
  if(section===5){
    if(state.answers['s6_vote']===undefined)e['s6_vote']='Please select a rating';
    if(state.answers['s6_knowscandidate']===undefined)e['s6_knowscandidate']='Please select an answer';
  }
  state.errors=e;
  return Object.keys(e).length===0;
}
function nextSection(){if(!validate(state.section)){render();window.scrollTo(0,0);return;}if(state.section<5){state.section++;render();window.scrollTo(0,0);}else{submitSurvey();}}
function prevSection(){if(state.section>0){state.section--;render();window.scrollTo(0,0);}}
function startSurvey(){state.screen='survey';render();}
async function submitSurvey(){
  state.screen='submitting';render();
  const a=state.answers;
  const rateStr=(prefix,items)=>items.map((item,i)=>`${item.split(' — ')[0]}: ${(a[`${prefix}_${i}`]||0)+1}`).join(' | ');
  const fields={
    'S1 Fence scenario':['Pay share','Negotiate','Hold firm','Third party','Complicated'][a['s1_fence']]||'',
    'S1 Dirt bikes scenario':['Leave it','Designated area','Clear rules','Ban it','Community conversation'][a['s1_bikes']]||'',
    'S1 Tree scenario':['Individual decision','Collective responsibility','Town needs bylaws','Complicated','Not sure'][a['s1_tree']]||'',
    'Q1 Personal qualities':rateStr('s2_q1',Q1_ITEMS),
    'Q2 How they think':rateStr('s2_q2',Q2_ITEMS),
    'Q3 How they act':rateStr('s2_q3',Q3_ITEMS),
    'Q4 What they stand for':rateStr('s2_q4',Q4_ITEMS),
    'Values at council table':a['s2_values']||'',
    'Missing quality':a['s2_missing']||'',
    'Mayor needs':a['s2_mayor']||'',
    'Current council gap score':(a['s2_gap']||0)+1,
    'Biggest gap':a['s2_gaptext']||'',
    'Top 3 voting qualities':(a['s2_top3']||[]).join(', '),
    'Priority A1':rateStr('s3a1',S2A1_ITEMS),
    'Priority A2':rateStr('s3a2',S2A2_ITEMS),
    'Priority A comment':a['s3a_comment']||'',
    'Priority B':rateStr('s3b',S2B_ITEMS),
    'K1':a['k1']===1?'Correct':'Incorrect',
    'K2':a['k2']===3?'Correct':'Incorrect',
    'K3':a['k3']===2?'Correct':'Incorrect',
    'K4':a['k4']===0?'Correct':'Incorrect',
    'K5':a['k5']===1?'Correct':'Incorrect',
    'Civic knowledge score':getCivicScore(),
    'Self assessed familiarity':(a['s4_familiar']||0)+1,
    'Years in Comox':a['s5_years']||'',
    'Years in Comox open':a['s5_years_open']||'',
    'Neighbourhood':a['s5_neighbourhood']==='Other'?'Other - '+(a['s5_neighbourhood_other']||'not specified'):a['s5_neighbourhood']||'',
    'OCP participation':['Yes participated','Aware did not participate','Was not aware'][a['s5_ocp_participated']]||'',
    'OCP how participated':(a['s5_ocp_how']||[]).join(', '),
    'OCP non participation reason':['Not enough time','Did not feel input would matter','Did not know enough','Other'][a['s5_ocp_why']]||'',
    'OCP height change':['Was not aware','Yes supports','Needs more info','Does not support'][a['s5_height']]||'',
    '6 storeys across neighbourhoods':['Yes anywhere','Downtown only','Specific areas','Prefers 4 storeys or less','Needs more info'][a['s5_storeys']]||'',
    'OCP amendment timing':['Not 12 months','Not 2 years','5 year review only','Anytime','Not sure'][a['s5_ocp_amend']]||'',
    '4 to 3 vote consensus score':(a['s5_vote43']||0)+1,
    'Growth forecast view':['Growth needed targets right','Some densification scaled','Focus on 6 OCP areas','Support densification but impacts first','Not aware','Needs more info'][a['s5_growth']]||'',
    'Traffic strategy adequate':['Yes','No','Not aware','Needs more info'][a['s5_traffic']]||'',
    'Community opposition score':(a['s5_opposition']||0)+1,
    'Public trust score':(a['s5_trust']||0)+1,
    'Rebuild trust':a['s5_trusttext']||'',
    'Arms length score':(a['s5_armslength']||0)+1,
    'Conflict disqualifiers':(a['s5_disqualify']||[]).join(', '),
    'Best change last 4 years':a['s5_best']||'',
    'Improve next 4 years':a['s5_improve']||'',
    'Vote intention':(a['s6_vote']||0)+1,
    'Voting barrier':['Not enough time','Does not know candidates','No trusted candidate','Has not thought about it','Other'][a['s6_barrier']]||'',
    'Engagement actions':(a['s6_engage']||[]).join(', '),
    'Engagement score':getEngagementScore(),
    'Engagement profile':getEngagementProfile(),
    'Volunteer name':a['s6_name']||'',
    'Volunteer email':a['s6_signup_email']||'',
    'Knows candidate':['Yes','Maybe','No'][a['s6_knowscandidate']]||'',
    'Meet greet interest':['Yes keep informed','Yes more info','Not right now'][a['s6_meetgreet']]||'',
    'Meet greet name':a['s6_mg_name']||'',
    'Meet greet email':a['s6_mg_email']||'',
    'Newsletter email':a['s6_newsletter']||'',
    'Submitted at':new Date().toISOString(),
  };
  try{
    const resp=await fetch(FORMSPREE,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(fields)});
    if(!resp.ok){const err=await resp.json();console.error('Formspree error:',err);}
    else console.log('Submission successful');
  }catch(err){console.error('Submission error:',err);}
  state.screen='results';render();window.scrollTo(0,0);
}
function renderLikert(id,count,labelLeft,labelRight){
  const cur=ga(id);
  let html='<div class="likert-row">';
  for(let i=0;i<count;i++)html+=`<button class="lk-btn${cur===i?' selected':''}" onclick="sa('${id}',${i})">${i+1}</button>`;
  html+='</div>';
  if(labelLeft)html+=`<div class="lk-labels"><span class="lk-label">${labelLeft}</span><span class="lk-label">${labelRight}</span></div>`;
  return html;
}
function renderScale(id,count,labelLeft,labelRight){
  const cur=ga(id);
  let html='<div class="scale-row">';
  for(let i=0;i<count;i++)html+=`<button class="scale-btn${cur===i?' selected':''}" onclick="sa('${id}',${i})">${i+1}</button>`;
  html+=`</div><div class="scale-labels"><span class="scale-label">${labelLeft}</span><span class="scale-label">${labelRight}</span></div>`;
  return html;
}

  const s3a2Labels=['Local economy','Recreation','Active transport','Fiscal responsibility','Climate'];
  const allS3=[...s3a1Labels,...s3a2Labels];
  const topS3a=allS3.reduce((best,label,i)=>{const score=i<5?(ga(`s3a1_${i}`)||0):(ga(`s3a2_${i-5}`)||0);return score>best.score?{label,score}:best;},{label:'—',score:-1});
  const s3bLabels=['Urban forest','Heritage','Salish Sea','Brooklyn Creek','Downtown','Storm water','Natural habitat'];
  const topS3b=s3bLabels.reduce((best,label,i)=>{const score=(ga(`s3b_${i}`)||0);return score>best.score?{label,score}:best;},{label:'—',score:-1});
  const topQ1=Q1_ITEMS.reduce((best,item,i)=>{const score=(ga(`s2_q1_${i}`)||0);return score>best.score?{item,score}:best;},{item:'—',score:-1});
  const profileDescs={'Comox Leader':'You\'re ready to lead the change — consider helping find candidates or getting more involved.','Community Champion':'You\'re a multiplier — your network and actions will bring others along.','Engaged Neighbour':'You\'re showing up where it counts. One more step: bring a neighbour.','Comox Neighbour':'Every journey starts somewhere. Your vote on Oct 17 matters enormously.'};
  return`
  <div class="result-section">
    <p class="section-label">Your results</p>
    <p class="section-title" style="margin-bottom:0.75rem">Thank you, neighbour <i class="ti ti-heart" style="color:#1D9E75"></i></p>
    <span class="profile-pill">${profile}</span>
    <p style="font-size:15px;color:#555;line-height:1.6">${profileDescs[profile]}</p>
  </div>
  <div class="result-section">
    <p style="font-size:14px;font-weight:500;margin-bottom:12px">Your snapshot</p>
    ${[['Civic knowledge',civic,5],['Self-assessed familiarity',selfFamiliar-1,4],['Vote intention',voteIntent-1,4],['Engagement actions',engagement,7]].map(([label,val,max])=>`<div class="score-row"><span class="score-label">${label}</span><div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(val/max*100)}%"></div></div><span class="score-val">${val}/${max}</span></div>`).join('')}
  </div>
  <div class="result-section">
    <p style="font-size:14px;font-weight:500;margin-bottom:12px">Your profile at a glance</p>
    <div class="corr-grid">
      <div class="corr-item"><p class="corr-title">Top personal quality</p><p class="corr-val">${topQ1.item}</p></div>
      <div class="corr-item"><p class="corr-title">Neighbourhood</p><p class="corr-val">${neighbourhood}</p></div>
      <div class="corr-item"><p class="corr-title">Knowledge vs confidence</p><p class="corr-val" style="color:${Math.abs(civicGap)>1?'#A32D2D':'#0F6E56'}">${civicGap>1?'Confidence exceeds knowledge':civicGap<-1?'More informed than you think':'Well-calibrated'}</p></div>
      <div class="corr-item"><p class="corr-title">OCP height change</p><p class="corr-val">${ga('s5_height')!==undefined?heightLabels[ga('s5_height')]:'—'}</p></div>
      <div class="corr-item"><p class="corr-title">Top community priority</p><p class="corr-val">${topS3a.label}</p></div>
      <div class="corr-item"><p class="corr-title">Top environmental priority</p><p class="corr-val">${topS3b.label}</p></div>
      <div class="corr-item"><p class="corr-title">Council gap score</p><p class="corr-val">${gapScore}/10</p></div>
      <div class="corr-item"><p class="corr-title">Public trust score</p><p class="corr-val">${trustScore}/10</p></div>
    </div>
    ${top3.length===3?`<div style="margin-top:12px;padding:12px;border-radius:8px;background:#f9f9f7;border:0.5px solid #e8e8e0"><p class="corr-title">Your 3 voting decision qualities</p><p style="font-size:15px;color:#1a1a1a;line-height:1.6;margin-top:4px">${top3.map(q=>q.split(' — ')[0]).join(' · ')}</p></div>`:''}
  </div>
  ${hasRun?`<div class="run-highlight"><p><i class="ti ti-star"></i> You said you'd consider running!</p><p>That's exactly the kind of neighbour Comox needs. The comoxvotes.ca team will be in touch.</p></div>`:''}
  <div class="result-section">
    <p class="closing-note">Your voice matters. By sharing your views today you are helping shape the kind of leadership and community Comox deserves on October 17, 2026.</p>
    <p class="closing-note">Together, we are neighbours committed to neighbourhood focused, traffic appropriate, context sensitive growth — to stewarding our natural environment, honouring our heritage, and safeguarding what makes Comox worth fighting for.</p>
    <p style="font-size:15px;color:#888">— The comoxvotes.ca team</p>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:1.5rem">
    <a href="https://www.comoxvotes.ca" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px"><i class="ti ti-home"></i> comoxvotes.ca</a>
  </div>`;
}
function render(){
  const app=document.getElementById('app');
  if(state.screen==='intro'){app.innerHTML=renderIntro();return;}
  if(state.screen==='submitting'){app.innerHTML=renderSubmitting();return;}
  if(state.screen==='results'){app.innerHTML=renderResults();return;}
  const sec=SECTIONS[state.section];
  const progress=(state.section/SECTIONS.length)*100;
  const dots=SECTIONS.map((_,i)=>`<div class="sec-dot${i<state.section?' done':i===state.section?' active':''}"></div>`).join('');
  let body='';
  if(state.section===0)body=renderSection0();
  else if(state.section===1)body=renderSection1();
  else if(state.section===2)body=renderSection2();
  else if(state.section===3)body=renderSection3();
  else if(state.section===4)body=renderSection4();
  else body=renderSection5();
  app.innerHTML=`
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="section-indicator">${dots}</div>
    <p class="section-label">${sec.label}</p>
    <p class="section-title">${sec.title}</p>
    <p class="section-desc">${sec.desc}</p>
    ${body}
    <div class="nav-row">
      <button class="btn" onclick="prevSection()" ${state.section===0?'disabled':''}>← Back</button>
      <span class="nav-step">${state.section+1} of 6</span>
      <button class="btn btn-primary" onclick="nextSection()">${state.section===5?'Submit survey →':'Next →'}</button>
    </div>`;
}
render();
</script>
</body>
</html>
